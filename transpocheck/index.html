<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <!-- Etiqueta Viewport corregida y optimizada para App Nativa -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover" />
    
    <title>LogisticAPP</title>
    
    <!-- Íconos de la aplicación -->
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    
    <!-- Archivo Manifest y color del tema -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Color negro para la barra de Samsung/Android -->
    <meta name="theme-color" content="#000000" />
    
    <!-- Modo inmersivo para Apple/iOS (Por si algún conductor usa iPhone) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    
    <script async src="https://docs.opencv.org/4.8.0/opencv.js" type="text/javascript"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
